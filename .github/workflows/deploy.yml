name: Deploy to infomatrix.alashed.kz

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-north-1
        run: |
          CMD=$(aws ssm send-command \
            --instance-ids "i-08eb56616ddb569bc" \
            --document-name "AWS-RunShellScript" \
            --region eu-north-1 \
            --comment "infomatrix-autodeploy" \
            --parameters '{"commands":["bash /home/ubuntu/infomatrix/scripts/server-deploy.sh"]}' \
            --output text --query "Command.CommandId")

          echo "SSM Command: $CMD"
          sleep 45

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD" \
            --instance-id "i-08eb56616ddb569bc" \
            --region eu-north-1 \
            --query "Status" --output text)

          OUT=$(aws ssm get-command-invocation \
            --command-id "$CMD" \
            --instance-id "i-08eb56616ddb569bc" \
            --region eu-north-1 \
            --query "StandardOutputContent" --output text)

          echo "$OUT"

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi

          echo "✅ Deployed to https://infomatrix.alashed.kz"
