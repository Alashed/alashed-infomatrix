name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  S3_BUCKET: alashed-media
  INSTANCE_ID: i-08eb56616ddb569bc
  APP_NAME: alashed-infomatrix
  APP_DIR: /home/ubuntu/infomatrix
  PORT: 7000
  DOMAIN: infomatrix.alashed.kz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create deployment package
        run: |
          tar -czf /tmp/infomatrix-deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude='*.tar.gz' \
            --exclude=.env \
            --exclude=.github \
            --exclude=state.json \
            .

      - name: Upload to S3
        run: |
          S3_KEY="deploys/${APP_NAME}-$(date +%Y%m%d-%H%M%S).tar.gz"
          aws s3 cp /tmp/infomatrix-deploy.tar.gz "s3://${S3_BUCKET}/${S3_KEY}" \
            --region "$AWS_REGION"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

          PRESIGNED_URL=$(aws s3 presign "s3://${S3_BUCKET}/${S3_KEY}" \
            --expires-in 900 --region "$AWS_REGION")
          echo "PRESIGNED_URL=${PRESIGNED_URL}" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSM
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN || 'infomatrix2026' }}
        run: |

          # Create parameters file and upload to server
          cat > /tmp/deploy-params.env << EOF
          export PRESIGNED_URL="${PRESIGNED_URL}"
          export APP_DIR="${APP_DIR}"
          export PORT="${PORT}"
          export ADMIN_TOKEN="${ADMIN_TOKEN}"
          export DATABASE_URL="${DATABASE_URL}"
          EOF

          aws s3 cp /tmp/deploy-params.env "s3://${S3_BUCKET}/deploys/infomatrix-params.env" \
            --region "$AWS_REGION"

          PARAMS_URL=$(aws s3 presign "s3://${S3_BUCKET}/deploys/infomatrix-params.env" \
            --expires-in 600 --region "$AWS_REGION")

          # Create inline deployment script to avoid chicken-egg problem
          cat > /tmp/deploy-inline.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e

          # Download params
          curl -sf "$PARAMS_URL" > /tmp/infomatrix-deploy-params.env
          source /tmp/infomatrix-deploy-params.env

          echo "=== INFOMATRIX Deploy ==="

          # Download from S3
          echo "1. Downloading from S3..."
          cd /tmp && curl -sf "$PRESIGNED_URL" -o infomatrix.tar.gz

          # Backup and extract
          echo "2. Extracting..."
          sudo -u ubuntu bash -c "rm -rf ${APP_DIR}.old; mv ${APP_DIR} ${APP_DIR}.old 2>/dev/null || true; mkdir -p ${APP_DIR}"
          sudo -u ubuntu bash -c "tar -xzf /tmp/infomatrix.tar.gz -C ${APP_DIR}"

          # Install deps
          echo "3. Installing dependencies..."
          sudo -u ubuntu bash -c "cd ${APP_DIR} && npm install --production --silent"

          # Create .env
          echo "4. Creating .env..."
          sudo -u ubuntu bash -c "cat > ${APP_DIR}/.env << EOF
          PORT=${PORT}
          NODE_ENV=production
          ADMIN_TOKEN=${ADMIN_TOKEN}
          DATABASE_URL=${DATABASE_URL}
          EOF"

          # Update systemd service file
          echo "5. Updating systemd service..."
          sudo cp ${APP_DIR}/infomatrix.service /etc/systemd/system/infomatrix.service
          sudo systemctl daemon-reload

          # Kill all node processes (nuclear option)
          echo "6. Killing all node processes..."
          echo "Before kill - node processes:"
          ps aux | grep node | grep -v grep || echo "No node processes found"

          sudo pkill -9 -u ubuntu node || true
          sudo killall -9 node || true
          sudo systemctl stop infomatrix 2>/dev/null || true
          sleep 2

          echo "After kill - remaining processes:"
          ps aux | grep node | grep -v grep || echo "All node processes killed"

          # Start service
          echo "7. Starting service..."
          sudo systemctl enable infomatrix
          sudo systemctl start infomatrix
          sleep 3

          # Verify service is running
          echo "Service status:"
          sudo systemctl status infomatrix --no-pager || true

          echo ""
          echo "New node processes:"
          ps aux | grep node | grep -v grep || echo "No node processes"

          echo ""
          echo "Checking port ${PORT}:"
          sudo netstat -tlnp | grep :${PORT} || echo "Port not listening"

          # Health check
          echo "8. Health check..."
          sleep 2
          curl -sf http://localhost:${PORT}/health | jq . || echo "Health check warning"

          echo "✅ Deploy complete!"
          DEPLOY_SCRIPT

          DEPLOY_SCRIPT_URL=$(aws s3 presign "s3://${S3_BUCKET}/deploys/deploy-inline.sh" --expires-in 600 --region "$AWS_REGION" || true)

          if [ -z "$DEPLOY_SCRIPT_URL" ]; then
            aws s3 cp /tmp/deploy-inline.sh "s3://${S3_BUCKET}/deploys/deploy-inline.sh" --region "$AWS_REGION"
            DEPLOY_SCRIPT_URL=$(aws s3 presign "s3://${S3_BUCKET}/deploys/deploy-inline.sh" --expires-in 600 --region "$AWS_REGION")
          fi

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --region "$AWS_REGION" \
            --comment "infomatrix-github-deploy" \
            --parameters "{\"commands\":[\"export PARAMS_URL='$PARAMS_URL' && curl -sf '$DEPLOY_SCRIPT_URL' -o /tmp/deploy.sh && chmod +x /tmp/deploy.sh && /tmp/deploy.sh 2>&1\"]}" \
            --output text --query "Command.CommandId")

          echo "SSM Command ID: $CMD_ID"
          echo "Waiting for deployment to complete..."
          sleep 25

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "Status" \
            --output text 2>/dev/null || echo "Unknown")

          echo "Deployment status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Deployment successful!"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION" \
            --query "StandardOutputContent" \
            --output text | tail -20

      - name: Verify deployment
        run: |
          echo "Waiting for service to be ready..."
          sleep 5

          HEALTH_STATUS=$(curl -sf https://${DOMAIN}/health | jq -r '.status' || echo "error")

          if [ "$HEALTH_STATUS" = "ok" ] || [ "$HEALTH_STATUS" = "degraded" ]; then
            echo "✅ Deployment verified successfully!"
            echo "🌐 Display: https://${DOMAIN}/"
            echo "🔐 Admin: https://${DOMAIN}/admin"
            echo "❤️  Health: https://${DOMAIN}/health"
          else
            echo "❌ Health check failed: $HEALTH_STATUS"
            exit 1
          fi
