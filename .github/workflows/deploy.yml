name: Deploy to infomatrix.alashed.kz

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          tar -czf /tmp/infomatrix-deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude='*.tar.gz' \
            --exclude=.env \
            --exclude=state.json \
            .

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-north-1
        run: |
          S3_KEY="deploys/alashed-infomatrix-$(date +%Y%m%d-%H%M%S).tar.gz"
          aws s3 cp /tmp/infomatrix-deploy.tar.gz "s3://alashed-media/${S3_KEY}" --region eu-north-1
          PRESIGNED_URL=$(aws s3 presign "s3://alashed-media/${S3_KEY}" --expires-in 900 --region eu-north-1)
          echo "PRESIGNED_URL=$PRESIGNED_URL" >> $GITHUB_ENV

      - name: Deploy via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-north-1
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          CMD=$(aws ssm send-command \
            --instance-ids "i-08eb56616ddb569bc" \
            --document-name "AWS-RunShellScript" \
            --region eu-north-1 \
            --comment "infomatrix-autodeploy" \
            --parameters "commands=[
              'cd /tmp && curl -sf -o infomatrix.tar.gz \"${PRESIGNED_URL}\"',
              'sudo -u ubuntu bash -c \"rm -rf /home/ubuntu/infomatrix.old; mv /home/ubuntu/infomatrix /home/ubuntu/infomatrix.old 2>/dev/null || true; mkdir -p /home/ubuntu/infomatrix\"',
              'sudo -u ubuntu bash -c \"tar -xzf /tmp/infomatrix.tar.gz -C /home/ubuntu/infomatrix\"',
              'sudo -u ubuntu bash -c \"cd /home/ubuntu/infomatrix && npm install --production --silent\"',
              'printf \"PORT=7000\\nNODE_ENV=production\\nADMIN_TOKEN=${ADMIN_TOKEN}\\nDATABASE_URL=${DATABASE_URL}\\n\" | sudo tee /home/ubuntu/infomatrix/.env > /dev/null',
              'sudo systemctl restart infomatrix',
              'sleep 4 && sudo systemctl is-active infomatrix && echo OK'
            ]" \
            --output text --query "Command.CommandId")

          echo "SSM Command: $CMD"
          sleep 30

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD" \
            --instance-id "i-08eb56616ddb569bc" \
            --region eu-north-1 \
            --query "Status" --output text)

          OUT=$(aws ssm get-command-invocation \
            --command-id "$CMD" \
            --instance-id "i-08eb56616ddb569bc" \
            --region eu-north-1 \
            --query "StandardOutputContent" --output text)

          echo "$OUT"

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi

          echo "✅ Deployed to https://infomatrix.alashed.kz"
